<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Valerie Jones</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8f7f4;
        --text: #24211d;
        --muted: #6d665d;
        --line: #ddd7cf;
        --accent: #2f6f73;
        --card: #ffffff;
        --approximation: #7c3aed;
        --matrices: #0043bf;
        --iteration: #2b6e1f;
        --solvers: #78223d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.6;
      }

      main {
        width: min(100% - 32px, 880px);
        margin: 0 auto;
        padding: 56px 0;
      }

      header {
        margin-bottom: 48px;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 12px;
        font-size: clamp(2.25rem, 8vw, 4.5rem);
        line-height: 1;
        font-weight: 700;
        letter-spacing: 0;
      }

      h2 {
        margin-bottom: 14px;
        font-size: 1rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      a {
        color: var(--accent);
        text-decoration-thickness: 1px;
        text-underline-offset: 4px;
      }

      a:hover {
        color: var(--text);
      }

      .top-link {
        display: inline-block;
        font-weight: 600;
      }

      section {
        padding: 32px 0;
        border-top: 1px solid var(--line);
      }

      .bio {
        max-width: 680px;
        color: var(--muted);
        font-size: 1.05rem;
      }

      .project-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 18px;
        margin-top: 22px;
      }

      .project-card {
        display: flex;
        min-height: 190px;
        flex-direction: column;
        justify-content: space-between;
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--card);
      }

      .project-card-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }

      .project-card h3 {
        margin: 0;
        font-size: 1.2rem;
        line-height: 1.3;
      }

      .project-badge {
        flex: 0 0 auto;
        display: inline-flex;
        margin-top: 1px;
        padding: 4px 9px;
        border-radius: 999px;
        background: var(--badge-color, var(--approximation));
        color: #ffffff;
        font-size: 0.75rem;
        font-weight: 700;
        line-height: 1.2;
      }

      .project-badge {
        flex: 0 0 auto;
        display: inline-flex;
        margin-top: 1px;
        padding: 4px 9px;
        border-radius: 999px;
        background: var(--badge-color, var(--matrices));
        color: #ffffff;
        font-size: 0.75rem;
        font-weight: 700;
        line-height: 1.2;
      }

      .project-badge {
        flex: 0 0 auto;
        display: inline-flex;
        margin-top: 1px;
        padding: 4px 9px;
        border-radius: 999px;
        background: var(--badge-color, var(--iteration));
        color: #ffffff;
        font-size: 0.75rem;
        font-weight: 700;
        line-height: 1.2;
      }

      .project-badge {
        flex: 0 0 auto;
        display: inline-flex;
        margin-top: 1px;
        padding: 4px 9px;
        border-radius: 999px;
        background: var(--badge-color, var(--solvers));
        color: #ffffff;
        font-size: 0.75rem;
        font-weight: 700;
        line-height: 1.2;
      }

      .project-card p {
        margin-bottom: 24px;
        color: var(--muted);
      }

      .project-card a {
        font-weight: 600;
      }

      @media (max-width: 560px) {
        main {
          width: min(100% - 24px, 880px);
          padding: 36px 0;
        }

        header {
          margin-bottom: 36px;
        }

        section {
          padding: 26px 0;
        }

        .project-card {
          min-height: auto;
        }

        .project-card-header {
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Valerie Jones</h1>
        <a class="top-link" href="https://www.linkedin.com/in/valerie-jones-60a007243" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      </header>

      <section aria-labelledby="bio-heading">
        <p class="bio">
          Final-year Mathematics undergraduate at University of Bath with interests in data science and mathematical programming.
        </p>
      </section>

      <section aria-labelledby="projects-heading">
        <h2 id="projects-heading">Projects</h2>
        <div class="project-grid" id="project-grid"></div>
      </section>
    </main>

    <script>
      const projects = [
        {
          name: "Geometric Tracing",
          url: "geometric-tracing/",
          description: "An interactive tool that converts images into mathematical curve representations using piecewise linear and parametric Catmull-Rom spline approximation",
          badge: "Approximation",
          badgeColor: "var(--approximation)",
        },
        {
          name: "Matrix Mapper",
          url: "matrix-mapper/",
          description: "An interactive tool for visualising how 2×2 matrices transform shapes through scaling, rotation, reflection and shear operations",
          badge: "Matrices",
          badgeColor: "var(--matrices)",
        },
        {
          name: "Jacobi vs Gauss-Seidel",
          url: "/jacobi-vs-gs/",
          description: "An interactive tool for comparing how Jacobi and Gauss-Seidel iterations converge toward the solution of a 2D linear system",
          badge: "Solvers",
          badgeColor: "var(--solvers)",
        },
        {
          name: "Dominant Eigenvector",
          url: "/dominant-eigenvector-visualisation/",
          description: "An interactive tool for visualising how repeated matrix multiplication converges to the dominant eigenvector of a matrix",
          badge: "Iteration",
          badgeColor: "var(--iteration)",
        },
      ];

      const projectGrid = document.querySelector("#project-grid");

      projects.forEach((project) => {
        const card = document.createElement("article");
        card.className = "project-card";

        card.innerHTML = `
          <div>
            <div class="project-card-header">
              <h3>${project.name}</h3>
              <span class="project-badge" style="--badge-color: ${project.badgeColor};">${project.badge}</span>
            </div>
            <p>${project.description}</p>
          </div>
          <a href="${project.url}" target="_blank" rel="noopener noreferrer">View project</a>
        `;

        projectGrid.appendChild(card);
      });
    </script>
  </body>
</html>
